<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Métricas — Sofia · Engel Advogados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16181C;
    --surface: #1E2127;
    --surface-2: #262A32;
    --border: #333844;
    --text: #F1EFE8;
    --text-muted: #8D91A0;
    --text-faint: #5C6070;

    --sofia: #4B9EF0;
    --sofia-soft: rgba(75,158,240,0.12);

    --green: #35C48C;
    --amber: #F2A93B;
    --purple: #8F7FE8;
    --teal: #2FD1C0;

    --radius: 14px;
    --radius-sm: 9px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .display{ font-family:'Space Grotesk', 'Inter', sans-serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 24px 64px;
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .title-block h1{
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .title-block p{
    margin:0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .status-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .pulse-wrap{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .pulse-dot{
    width: 7px; height:7px; border-radius: 50%;
    background: var(--text-faint);
    position: relative;
  }
  .pulse-dot.live{ background: var(--green); }
  .pulse-dot.live::after{
    content:'';
    position:absolute; inset:-4px;
    border-radius:50%;
    border: 1.5px solid var(--green);
    opacity: .55;
    animation: pulse 2.2s ease-out infinite;
  }
  .pulse-dot.error{ background:#E2564C; }
  @keyframes pulse{
    0%{ transform:scale(0.6); opacity:.7; }
    100%{ transform:scale(1.8); opacity:0; }
  }

  /* ---------- PERIOD TABS ---------- */
  .tabs{
    display:inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .tabs button{
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .tabs button.active{
    background: var(--text);
    color: var(--bg);
    font-weight: 600;
  }

  /* ---------- CUSTOM PERIOD BAR ---------- */
  .custom-bar{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .custom-bar .divider{
    width:1px; height:20px; background: var(--border);
    margin: 0 4px;
  }
  .shortcut-chip{
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .shortcut-chip:hover{ color: var(--text); border-color: var(--text-faint); }

  .month-picker{ position: relative; }
  .month-picker-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    display:flex; align-items:center; gap:6px;
  }
  .month-picker-btn.active-custom{
    color: var(--text);
    border-color: var(--sofia);
    background: var(--sofia-soft);
  }
  .month-picker-btn .chev{ font-size:9px; color: var(--text-faint); }

  .month-panel{
    position:absolute;
    top: calc(100% + 8px);
    left:0;
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    width: 220px;
    display:none;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .month-panel.open{ display:block; }
  .month-panel-title{
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: .03em;
    margin-bottom: 8px;
  }
  .month-list{
    max-height: 220px;
    overflow-y: auto;
    display:flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 10px;
  }
  .month-item{
    display:flex;
    align-items:center;
    gap: 9px;
    padding: 6px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .month-item:hover{ background: var(--surface-2); }
  .month-item input{ accent-color: var(--sofia); width:14px; height:14px; cursor:pointer; }
  .month-panel-actions{
    display:flex;
    gap:6px;
  }
  .month-panel-actions button{
    flex:1;
    font-family:'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px;
    border-radius: 7px;
    cursor: pointer;
    border: none;
  }
  .btn-apply{ background: var(--sofia); color: #fff; }
  .btn-apply:disabled{ opacity:.4; cursor:default; }
  .btn-clear{ background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border) !important; }

  /* ---------- AGENT PANEL ---------- */
  .panel{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    opacity: 0;
    transform: translateY(6px);
    animation: rise .45s ease forwards;
  }
  @keyframes rise{ to{ opacity:1; transform:none; } }

  .panel-head{
    display:flex;
    align-items:center;
    gap: 13px;
    margin-bottom: 18px;
  }

  .avatar{
    width: 42px; height:42px;
    border-radius: 11px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
    background: var(--sofia-soft); color: var(--sofia);
  }

  .agent-name{
    font-size: 15px;
    font-weight: 600;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .agent-role{
    font-size: 12px;
    color: var(--text-muted);
    margin-top:1px;
  }
  .agent-role .mono{ color: var(--text-faint); }

  .status-chip{
    font-size: 10.5px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    letter-spacing: .02em;
    background: var(--sofia-soft); color: var(--sofia);
  }

  .period-caption{
    font-size: 12px;
    color: var(--text-faint);
    margin: -10px 0 16px;
  }

  /* ---------- METRIC TILES ---------- */
  .tiles{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tile{
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px 12px;
  }
  .tile.wide{ grid-column: 1 / -1; }

  .tile-label{
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tile-label .sw{
    width:7px; height:7px; border-radius:2px; flex-shrink:0;
  }
  .tile-value{
    font-family:'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }
  .bar-track{
    height: 4px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .bar-fill{
    height:100%;
    border-radius: 3px;
    width: 0%;
    transition: width .5s ease;
  }
  .tile-pct{
    font-size: 10.5px;
    color: var(--text-faint);
  }

  /* ---------- EMPTY / ERROR STATES ---------- */
  .empty-state{
    text-align:center;
    padding: 64px 20px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .empty-state .glyph{
    font-family:'Space Grotesk', sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .empty-state h3{
    color: var(--text);
    font-size: 15px;
    margin: 0 0 6px;
  }
  .empty-state p{
    font-size: 13px;
    margin: 0 auto;
    max-width: 380px;
    line-height: 1.5;
  }
  .empty-state code{
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  footer{
    margin-top: 22px;
    display:flex;
    justify-content: space-between;
    align-items:center;
    font-size: 11.5px;
    color: var(--text-faint);
    flex-wrap: wrap;
    gap: 8px;
  }
  footer .mono{ color: var(--text-faint); }

  .skeleton{
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 37%, var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 5px;
    color: transparent !important;
  }
  @keyframes shimmer{
    0%{ background-position: 100% 50%; }
    100%{ background-position: 0 50%; }
  }

  @media (max-width: 560px){
    header{ flex-direction: column; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="title-block">
      <h1>Painel Sofia — Controladoria</h1>
      <p>Engel Advogados · atendimento via IA</p>
    </div>

  </header>

  <div class="status-row">
    <div class="pulse-wrap">
      <span class="pulse-dot" id="pulseDot"></span>
      <span id="statusText">Aguardando conexão</span>
    </div>

    <div class="tabs" id="periodTabs">
      <button data-period="hoje" class="active">Hoje</button>
      <button data-period="semana">Esta semana</button>
      <button data-period="mes">Este mês</button>
    </div>
  </div>

  <div class="custom-bar">
    <span class="divider"></span>
    <button class="shortcut-chip" id="quarterBtn">Trimestre atual</button>
    <button class="shortcut-chip" id="semesterBtn">Semestre atual</button>

    <div class="month-picker">
      <button class="month-picker-btn" id="monthPickerBtn">
        <span id="monthPickerLabel">Selecionar meses…</span>
        <span class="chev">▾</span>
      </button>
      <div class="month-panel" id="monthPanel">
        <div class="month-panel-title">Escolha um ou mais meses</div>
        <div class="month-list" id="monthList"></div>
        <div class="month-panel-actions">
          <button class="btn-clear" id="clearMonthsBtn" type="button">Limpar</button>
          <button class="btn-apply" id="applyMonthsBtn" type="button" disabled>Aplicar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="panelHolder">
    <div class="empty-state">
      <div class="glyph">S</div>
      <h3>Carregando dados…</h3>
      <p>Conectando ao serviço de métricas da Sofia.</p>
    </div>
  </div>

  <footer>
    <span id="lastUpdated"></span>
    <span id="autoRefreshNote"></span>
  </footer>

</div>

<script>
(function(){
  const COLORS = {
    total: 'var(--text-muted)',
    emAberto: 'var(--amber)',
    concluidos: 'var(--green)',
    transferidos: 'var(--purple)',
    efetividade: 'var(--teal)',
  };

  const DADOS_URL = './dados.json';
  const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let dados = null; // { canal, sessoes: [...], emAbertoAtual, atualizado_em }
  let currentPeriod = 'hoje'; // hoje | semana | mes | custom
  let selectedMonths = [];
  let refreshTimer = null;
  let tickTimer = null;
  let lastFetchTime = null;

  const els = {
    pulseDot: document.getElementById('pulseDot'),
    statusText: document.getElementById('statusText'),
    panelHolder: document.getElementById('panelHolder'),
    lastUpdated: document.getElementById('lastUpdated'),
    autoRefreshNote: document.getElementById('autoRefreshNote'),
    periodTabs: document.getElementById('periodTabs'),
    quarterBtn: document.getElementById('quarterBtn'),
    semesterBtn: document.getElementById('semesterBtn'),
    monthPickerBtn: document.getElementById('monthPickerBtn'),
    monthPickerLabel: document.getElementById('monthPickerLabel'),
    monthPanel: document.getElementById('monthPanel'),
    monthList: document.getElementById('monthList'),
    clearMonthsBtn: document.getElementById('clearMonthsBtn'),
    applyMonthsBtn: document.getElementById('applyMonthsBtn'),
  };

  // ---------- Timezone helpers (America/Sao_Paulo), iguais ao workflow do n8n ----------
  function fmtSP(date, opts){
    return new Intl.DateTimeFormat('en-CA', Object.assign({ timeZone: 'America/Sao_Paulo' }, opts)).format(date);
  }
  function dateKeySP(d){ return fmtSP(d, { year:'numeric', month:'2-digit', day:'2-digit' }); }
  function monthKeySP(d){ return dateKeySP(d).slice(0,7); }
  function hojeStr(){ return dateKeySP(new Date()); }
  function iniSemana(){
    const hoje = new Date(hojeStr() + 'T00:00:00-03:00');
    const dow = hoje.getUTCDay();
    const seg = new Date(hoje);
    seg.setUTCDate(hoje.getUTCDate() - (dow === 0 ? 6 : dow - 1));
    return seg;
  }
  function iniMes(){ return new Date(hojeStr().slice(0,7) + '-01T00:00:00-03:00'); }
  function mesmodia(date){
    if (!date) return false;
    const d = new Date(date);
    if (!Number.isFinite(d.getTime())) return false;
    return dateKeySP(d) === hojeStr();
  }
  function dentroDoPeriodo(date, from){
    if (!date || !from) return false;
    const d = new Date(date);
    return Number.isFinite(d.getTime()) && d >= from;
  }

  // ---------- Cálculo dos KPIs a partir das sessões já classificadas ----------
  function bucketMetrics(sessoes, emAbertoAtual){
    const m = { total: sessoes.length, emAberto: emAbertoAtual, concluidos: 0, transferidos: 0, efetividade: 0 };
    sessoes.forEach(s => {
      if (s.concluido) m.concluidos++;
      if (s.transferido) m.transferidos++;
      if (s.efetivo) m.efetividade++;
    });
    return m;
  }

  function mesesDisponiveis(){
    if (!dados) return [];
    return [...new Set(dados.sessoes.map(s => s.started_at ? monthKeySP(new Date(s.started_at)) : null).filter(Boolean))].sort();
  }

  els.periodTabs.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    setSimplePeriod(btn.dataset.period);
  });

  function setSimplePeriod(period){
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    [...els.periodTabs.children].find(b => b.dataset.period === period)?.classList.add('active');
    els.monthPickerBtn.classList.remove('active-custom');
    currentPeriod = period;
    if (dados) render();
  }

  els.monthPickerBtn.addEventListener('click', () => {
    els.monthPanel.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!els.monthPanel.contains(e.target) && e.target !== els.monthPickerBtn && !els.monthPickerBtn.contains(e.target)){
      els.monthPanel.classList.remove('open');
    }
  });

  els.clearMonthsBtn.addEventListener('click', () => {
    selectedMonths = [];
    [...els.monthList.querySelectorAll('input')].forEach(i => i.checked = false);
    els.applyMonthsBtn.disabled = true;
    els.monthPickerLabel.textContent = 'Selecionar meses…';
  });

  els.applyMonthsBtn.addEventListener('click', () => {
    if (selectedMonths.length === 0) return;
    els.monthPanel.classList.remove('open');
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    els.monthPickerBtn.classList.add('active-custom');
    currentPeriod = 'custom';
    render();
  });

  els.quarterBtn.addEventListener('click', () => {
    const meses = mesesDisponiveis().slice().reverse().slice(0, 3).reverse();
    if (!meses.length) return;
    applyMonthSelection(meses);
    els.monthPickerBtn.classList.add('active-custom');
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    currentPeriod = 'custom';
    render();
  });

  els.semesterBtn.addEventListener('click', () => {
    const meses = mesesDisponiveis().slice().reverse().slice(0, 6).reverse();
    if (!meses.length) return;
    applyMonthSelection(meses);
    els.monthPickerBtn.classList.add('active-custom');
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    currentPeriod = 'custom';
    render();
  });

  function applyMonthSelection(meses){
    selectedMonths = meses.slice();
    [...els.monthList.querySelectorAll('input')].forEach(i => {
      i.checked = selectedMonths.includes(i.value);
    });
    els.applyMonthsBtn.disabled = selectedMonths.length === 0;
    els.monthPickerLabel.textContent = selectedMonths.length ? rangeLabel(selectedMonths) : 'Selecionar meses…';
  }

  function setStatus(kind, text){
    els.pulseDot.classList.remove('live', 'error');
    if (kind === 'live') els.pulseDot.classList.add('live');
    if (kind === 'error') els.pulseDot.classList.add('error');
    els.statusText.textContent = text;
  }

  function showSkeleton(){
    els.panelHolder.innerHTML = panelSkeleton();
  }

  function panelSkeleton(){
    return `
      <div class="panel">
        <div class="panel-head">
          <div class="avatar skeleton" style="width:42px;height:42px;">&nbsp;</div>
          <div>
            <div class="agent-name skeleton" style="width:80px;">&nbsp;</div>
            <div class="agent-role skeleton" style="width:120px; margin-top:5px;">&nbsp;</div>
          </div>
        </div>
        <div class="tiles">
          ${Array.from({length:5}).map((_,i) => `
            <div class="tile ${i===4?'wide':''}">
              <div class="tile-label skeleton" style="width:60px;">&nbsp;</div>
              <div class="tile-value skeleton" style="width:40px;">&nbsp;</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  async function carregarDados(){
    setStatus('loading', 'Carregando…');
    showSkeleton();
    try {
      const res = await fetch(DADOS_URL + '?t=' + Date.now(), { method: 'GET', cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      dados = data;
      lastFetchTime = data.atualizado_em ? new Date(data.atualizado_em) : new Date();
      populateMonthList();
      setStatus('live', 'Conectado');
      startTicker();
      render();
    } catch (err){
      setStatus('error', 'Falha ao carregar dados: ' + err.message);
      els.panelHolder.innerHTML = `
        <div class="empty-state">
          <div class="glyph" style="color:#E2564C;">!</div>
          <h3>Não foi possível carregar os dados</h3>
          <p>O arquivo de dados ainda não está disponível ou falhou ao carregar. Se o painel acabou de ser publicado, aguarde a primeira atualização automática.</p>
        </div>`;
    }
  }

  function populateMonthList(){
    const ordered = mesesDisponiveis().slice().reverse();
    els.monthList.innerHTML = ordered.map(m => `
      <label class="month-item">
        <input type="checkbox" value="${m}" ${selectedMonths.includes(m) ? 'checked' : ''}>
        ${formatMonthLabel(m)}
      </label>`).join('') || '<div style="font-size:12px;color:var(--text-faint);padding:6px;">Nenhum mês disponível ainda.</div>';

    els.monthList.querySelectorAll('input').forEach(input => {
      input.addEventListener('change', () => {
        selectedMonths = [...els.monthList.querySelectorAll('input:checked')].map(i => i.value).sort();
        els.applyMonthsBtn.disabled = selectedMonths.length === 0;
        els.monthPickerLabel.textContent = selectedMonths.length ? rangeLabel(selectedMonths) : 'Selecionar meses…';
      });
    });
  }

  function formatMonthLabel(mes){
    const [ano, m] = mes.split('-');
    return MONTH_NAMES[parseInt(m,10) - 1] + ' / ' + ano;
  }

  function rangeLabel(meses){
    if (meses.length === 1) return formatMonthLabel(meses[0]);
    const sorted = meses.slice().sort();
    const first = sorted[0], last = sorted[sorted.length - 1];
    const [anoI, mI] = first.split('-');
    const [anoF, mF] = last.split('-');
    const contiguous = meses.length === (monthsBetween(first, last) + 1);
    if (contiguous){
      if (anoI === anoF) return MONTH_NAMES[+mI-1] + ' – ' + MONTH_NAMES[+mF-1] + ' / ' + anoF;
      return MONTH_NAMES[+mI-1] + '/' + anoI + ' – ' + MONTH_NAMES[+mF-1] + '/' + anoF;
    }
    return meses.length + ' meses selecionados';
  }

  function monthsBetween(a, b){
    const [ay, am] = a.split('-').map(Number);
    const [by, bm] = b.split('-').map(Number);
    return (by - ay) * 12 + (bm - am);
  }

  function startTicker(){
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(() => {
      if (!lastFetchTime) return;
      const secs = Math.floor((Date.now() - lastFetchTime.getTime())/1000);
      let txt;
      if (secs < 60) txt = 'dados de agora';
      else if (secs < 3600) txt = 'dados de ' + Math.floor(secs/60) + 'min atrás';
      else if (secs < 86400) txt = 'dados de ' + Math.floor(secs/3600) + 'h atrás';
      else txt = 'dados de ' + Math.floor(secs/86400) + 'd atrás';
      els.lastUpdated.textContent = txt;
    }, 1000);
  }

  function pct(v, t){ return t > 0 ? Math.round((v/t) * 100) : 0; }

  function tile(label, value, total, colorVar, wide){
    const p = pct(value, total);
    return `
      <div class="tile ${wide ? 'wide' : ''}">
        <div class="tile-label"><span class="sw" style="background:${colorVar}"></span>${label}</div>
        <div class="tile-value">${value}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${p}%; background:${colorVar};"></div></div>
        <div class="tile-pct mono">${total > 0 ? p + '% do período' : '—'}</div>
      </div>`;
  }

  function tileStatic(label, value, caption, colorVar){
    return `
      <div class="tile">
        <div class="tile-label"><span class="sw" style="background:${colorVar}"></span>${label}</div>
        <div class="tile-value">${value}</div>
        <div class="tile-pct mono">${caption}</div>
      </div>`;
  }

  function agentPanel(m, caption){
    return `
      <div class="panel">
        <div class="panel-head">
          <div class="avatar">S</div>
          <div>
            <div class="agent-name">Sofia <span class="status-chip">ATENDIMENTO</span></div>
            <div class="agent-role mono">canal ${m.canal || '—'}</div>
          </div>
        </div>
        <div class="period-caption">${caption}</div>
        <div class="tiles">
          ${tile('Sessões', m.total, m.total, COLORS.total)}
          ${tileStatic('Em aberto', m.emAberto, 'aguardando resposta agora', COLORS.emAberto)}
          ${tile('Concluídos', m.concluidos, m.total, COLORS.concluidos)}
          ${tile('Transferidos', m.transferidos, m.total, COLORS.transferidos)}
          ${tile('Efetividade Sofia', m.efetividade, m.total, COLORS.efetividade, true)}
        </div>
      </div>`;
  }

  const PERIOD_LABELS = { hoje: 'Dados de hoje', semana: 'Dados desta semana', mes: 'Dados deste mês' };

  function render(){
    if (!dados) return;
    let sessoesFiltradas, caption;

    if (currentPeriod === 'custom'){
      sessoesFiltradas = dados.sessoes.filter(s => s.started_at && selectedMonths.includes(monthKeySP(new Date(s.started_at))));
      caption = rangeLabel(selectedMonths);
    } else if (currentPeriod === 'hoje'){
      sessoesFiltradas = dados.sessoes.filter(s => mesmodia(s.started_at));
      caption = PERIOD_LABELS.hoje;
    } else if (currentPeriod === 'semana'){
      sessoesFiltradas = dados.sessoes.filter(s => dentroDoPeriodo(s.started_at, iniSemana()));
      caption = PERIOD_LABELS.semana;
    } else {
      sessoesFiltradas = dados.sessoes.filter(s => dentroDoPeriodo(s.started_at, iniMes()));
      caption = PERIOD_LABELS.mes;
    }

    const metrics = bucketMetrics(sessoesFiltradas, dados.emAbertoAtual);
    metrics.canal = dados.canal;

    els.panelHolder.innerHTML = agentPanel(metrics, caption);
  }

  carregarDados();
  refreshTimer = setInterval(carregarDados, 86400000);
  els.autoRefreshNote.textContent = 'Dados atualizados 1x por dia';
})();
</script>
